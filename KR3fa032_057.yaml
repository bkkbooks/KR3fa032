body:
  text: 志周遊四遠或采風俗以宏教化或探奇秀以壯襟懷或窮此疆爾界以察地形或訪聖賢名流以資師友凡此者雖不無跋涉之艱而向往之情終不可遏在昔漢時張騫使西域其足固巳履天竺元人都寶窮河源其迹亦會至崑崙逮本朝聖祖仁皇帝屢遣使臣往窮河源等處測量地度繪入圖與較之漢元所志又加詳焉我皇上威德廣被萬國向風罔不臣服絶徼以西盡隸版圖分遣使臣測量經緯諸度經行數萬里如履階闥凡山川曲折道里遠近較如列眉載籍所傳有無皆可按圖而辨猗與盛哉友仁以觀光佩臣幸逢盛際謹取新闢西域諸圖聯以西來所攜手輯疆域梗槩增補坤與全圖或以供有識臥遊之萬一也若夫諸曜遠近之次各方經緯之度渾天儀之新製以及日月五星之體象與夫輪心輪徑之比例西士屢經測驗古疏今密其立論不同之大指今皆載其大略書于圖之各旁俾覽茲圖者因象以究其理亦未必無小補云
