body:
  text: 通數術之士分往各國按法細測南北各度所容之里數自近赤道者自近北極者自居北極赤道之中者凡三處測其高度之容近赤道則狹漸離赤道則漸寬由此推得地球大圈之圓形不等止赤道為平圓而經圈皆為撱圓地球長徑過赤道短徑過兩極短徑與長徑之比例若二百六十五與二百六十六設如修地球或坤與圖者命過赤道徑二尺六寸六分則過極經止二尺六寸五分然斯差微小而于修地球或地圖或可不論也按京師營造尺一里得一百八十丈而新法測得赤道各度一百九十五里十七丈二尺一九五八若此數以三百六十乘之則得赤道周圍六萬九千一百三十四里七十八丈九尺七經圈上之初度一百九十里一百十八丈三尺第四十度一百九十一里九十五丈四尺第九十度一百九十二里一百四十六丈八尺總和經圈上諸度之里數則得經圈周圍六萬九千零二十四里一百零二丈七尺四大州天下萬國總分四大州日亞西亞日歐邏巴日利未亞三州俱于東半球容之弟四大州日南北亞墨利
