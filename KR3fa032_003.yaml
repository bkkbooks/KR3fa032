body:
  text: 地球圖説序經筳講官南書房行走戶部左侍郎兼管國子監算學臣阮元撰西洋人言天地之理最精其實莫非三代以來古法所舊有後之學者喜其新而宗之疑共奇而闢之皆非也言天員地員者顯著於大戴記會子天員篇元曩見編修杭世駿作梅交鼎傳言其有會子天員篇注向其裔人求之實無此稿但有一二條見天學疑問中元之注釋會子十篇也於天員篇未嘗不用泰西之説會子曰上首謂之員下首謂之方如誠天員而地方則是四角之不揜也參嘗聞之夫子曰天道曰員地道曰方據此則天員地員之説孔子會子已明言之非西域所創也周髀算經曰日運行處極北北方日中南方夜半日在極東東方日中西方夜半日在極南南方日中北方夜半日在極西西方日中東方夜半據此則天員地員之説周公商高巳明言之非西域所創也嘉定少詹事錢大昕以乾隆年閒奉旨所譯西法地球圖説一書見示且屬付梓元讀其書校熊三拔表度説等書更為明晰詳備按地球卽地員元時西域札馬魯丁造西域儀象有所謂苦來
  hash: sha256:1934d4d19b7d28fa107034dccc3b85caac87c7e792b6ec6dd505a7971b4eb7cc
