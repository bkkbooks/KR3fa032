body:
  text: 八日而一周土星距日最遠故其循本輪最遲計二十九年零一百五十五日而一周太陽在五星諸輪之一偏心凡各星相等之時所循本輪弧之面積亦相等設自太陽視之諸星雖遲速不等而皆為順行若自地視之則見其有留退等變然此變非諸星之變乃自地本輪半徑差所生也如第六圖地在本輪之坤點左坤卯線切地輪于坤點至黃道之卯點此坤卯線必交火木土三星之輪或此三星正在本輪與切線之交點火木土則自地視此三星正應于黃道之卯點若從日心計之則視火于子視木于丑視土于寅此子火卯丑木卯寅土卯三角之度即為火木土三星之地輪半徑差金水二星其輪在地輪之內自地作兩線一自地心至日心一自地心切星輪此兩線相交于地心之魚即為星與日之大距如第七圖坤乾為過日與地心線坤金坤水為切金水各輪之線金坤乾角即自地視金星與日之大距水坤乾角即自地視水星與月之大距將金坤水坤乾坤三線引之至恆星入于子于丑于卯此子坤卯丑坤卯角即為金水二星之地輪半徑差角五星合留順逆等變皆由地輪半徑差所生然其變有二
