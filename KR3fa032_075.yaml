body:
  text: 第八圖第九圖第十圖右三圖說中未及案五星條云五星合留順逆算變有二類由星輪在地輪內外不同之故各有圖詳之然則此三圖者蓋明午星合留順逆在地輪內外也擬為三圖一明地輪在星輪內一明地輪在星輪外一總明在內在外所以有合留順逆之故附于左方竝補說以詳之附圖一
