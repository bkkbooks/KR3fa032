body:
  text: 太陽最高之時因此時地距太陽最遠故也地循本輪從午向酉則地球與太陽應者漸近赤道地在本輪之酉點太陽正當地之赤道此時地旋轉于本心則見太陽于赤道圈旋行而畫夜適平秋分後地自酉點漸近子點則地球與太陽應者漸距赤道向南地在本輪之子點則地球與太陽應者在赤道南二十三度半此時地旋轉于本心則見太陽于冬至圈繞地左行冬至後第八日地在本輪之丁點是為太陽最卑之時因此時地距太陽最近故也地循本輪從子向卯則地球與太陽應者漸近赤道地至本輪之卯點則見太陽于赤道圈旋行地自卯點復至午點此時地行本輪一周人從地面視之則見太陽于黃道上循行一周而為一歲也太陽之視徑大小太陽之視行盈縮隨時不等皆自地兩運動而生地球循撱圓之理與太陽循撱圓之理略等撱圓之理詳見後編地半徑差地半徑差使人見諸曜卑于實高如十二圓庚為人目庚酉為地平線設數星遠近不等俱在地平線內于甲于丁于乙人自庚視此數星必見其應于天之
