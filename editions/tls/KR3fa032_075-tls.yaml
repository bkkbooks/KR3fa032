body:
  text: 第八圖第九圖第十圖右三圖説中未及案五星條云五星合畱順逆筭變有二類由星輪在地輪內外不同之故各有圖詳之然則此三圖者葢明午星合畱順逆在地輪內外也擬為三圖一明地輪在星輪內一明地輪在星輪外一總明在內在外所以有合畱順逆之故附于左方竝補説以詳之附圖一
