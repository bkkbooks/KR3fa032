body:
  text: 陽太陰相會之時太陰在太陽與地之間若地與太陰與太陽一線參直如地四圖地面上有月影之處如甲與丁則見太陰掩蔽太陽之光是為日食惟朔日太陰會太陽故獨朔日有日食若望時地球在太陰與太陽之間人從地面視日月相距百八十度若太陽與地與太陰一線參直如第三圖則太陰為地影所蔽不得受太陽之光是為月食惟望日太陰與太陽正相對故獨望日有月食太陽太陽之光雖大其面上每有黑點或一或二或三四不定其點初小漸長然後漸消以至于盡黑點或多且大則能減太陽之光此點特在太陽之面究不審其何物然視其自此往彼每以二十五日半復歸于原所則知太陽二十五日半旋轉于本心一周太陽每一日似西行繞地一周每一歲似東行一周天然此兩動非太陽之實動乃由地球旋轉于本輪而生太陰太陰及五星之體皆無光借太陽之光以為光若以望遠鏡望太陰之面則見其黑暗之處似山林湖
  hash: sha256:7d6f82ee3eda3ca2e1fae06a7269435bc1c5e21f0ad881a095aece75a1b24af6
