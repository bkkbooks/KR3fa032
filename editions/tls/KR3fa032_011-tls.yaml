body:
  text: 是為緯度經緯線皆分三百六十今圖止從各十度畫線以便觀覽也或問地周三百六十經度從何處起算日地旣為圓形則隨處可為初經度如以京師為主則京師卽為初經度各處或東或西皆以距京師之遠近計之今天文家作坤與圖則定初經度于鐵島京師觀星臺之經度距鐵島往東一百三十四度二分三十秒經線卽各地方之子午線也太陽于某處經線之上分應之則此處午正于某處經線之下分應之則此處子正凡各地方之時差皆準于經度太陽每日遶地一周為二十四小時太陽行十五度為一小時行一度為一小時之四分故知兩處之經度卽可推兩處之時差在東者以時差加在酉者以時差減如以京師為主京師之經度一百三十四度二分三十秒朝鮮國都城之經度一百四十五度距京師東十度五十七分三十秒變時為二刻十三分五十秒太陽至朝鮮都城之子午線則朝鮮都城計午正尚未至京師子午線其差為二刻十三分五十秒故京師止有午初一刻一分十秒若太陽至京師子午線則
