body:
  text: 體借太陽之光以為光與地球相似設有人在太陰及他曜面上則其視地球亦如地面上之視太陰有時晦有時光滿有時為上下弦此理凡通天穩者皆知之今六曜旣皆似地球豈有六曜及太陽循環地球而獨地球安靜之理乎不如設太陽于宇宙中心而地球及其餘游曜皆旋繞太陽以借太陽之光斯論不亦捷便乎水金地火木土六曜之本輪游繞乎太陽太陰之本輪旋繞乎地球而土木二星又各有小星之本輪繞之然太陽地球土木非為各本輪之中心而徵在其一偏其相距之數名為兩心差歌白尼將此諸輪作不同心之圈而刻白爾細察游曜之固然證此諸輪皆為撱圓撱圓有大小二徑竝有三心卽中心及兩偏心若知大小兩徑之比例或兩心差則可畫撱圓之式水金地太陰火木土竝木土周圍九小星皆有兩運動一循行其本輪一旋轉于本心太陽雖無本輪亦如他游曜旋轉于本心旣設地球之兩運動若地球于本心每日東行一周則諸曜在地周圍似每日西行一周地東行一年一周輪則太陽似東行一年一
