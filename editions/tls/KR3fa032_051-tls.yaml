body:
  text: 類由星輪在地輪內外不用之故各有圖詳之客星明史曰客星者言其非常卒之星殆諸異星之總名若客星不發光芒則日客星若發光芒則日學彗長今按客星之體非地氣上升亦竝非妖瑞之兆第如諸恒星及游星之體其行于天上也亦如游星行于本輪設如十一圖甲丙戊庚為客星之本輪此輪為撱圓形太陽在其遺偏心設客星行本輪之庚甲丙弧則距地遠故自地不見若行本輪之庚戊丙弧則距地近故自地可見相等之時其所行本輪弧之面積皆相等星愈近本輪之戊點則其行本輪之弧愈大而行愈速又撱圓之長徑愈長則其行一周愈遲故客星或五六十年止行一周止見一次古今懼客星為災因未明其實理耳茲千百餘年來巳測得五六客星再見之準策日後屢測諸客星之見庶可得其一定之數并隱見之諸策也渾天儀渾天儀者乃象日月諸曜旋轉之道範銅為儀以象天體中心置一小球以象地球天體渾圓運行不息人在地面視之常止見其半周設一平環絡天之半
