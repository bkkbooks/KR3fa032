body:
  text: 論春夏秋冬歌白尼論春夏秋冬四季之輪流亦由地運動而生如十五圖子卯午酉撱圓象地球一年所循之本輪斯輪相應于渾天之黃道地兩極之軸斜行于黃道之軸而地赤道斜行于本輪各二十三度半是為黃赤距緯地循本輪其軸恒斜而其極恒向天之兩極今設地在本輪之午點則地球之與太陽應者在赤道北二十三度半故此處見太陽于天頂此時地旋轉于本心則見太陽于夏至圈繞地左行北方之畫長南方之畫短夏至後第八日地在本輪之乙點為
  hash: sha256:d259faa2ee5c1ab30d6969dc2104c3aaf9221dd9bacb98a15216652757dd8260
