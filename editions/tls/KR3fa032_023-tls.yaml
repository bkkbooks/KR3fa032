body:
  text: 輯鳥毛為畫男女躶體以木葉或獸皮蔽前後喀納大產猛獸古俗南北亞墨利加祭魔殺人而聚黨共食今其諸國大半如如德亞七曜序次自古天文家推七政躔離行度其法詳矣西士殫其聰明各自推算乃剏想宇內諸曜之序次各成一家之論今姑取其緊要四宗以齊諸曜之運動而巳第一多祿畝見十六圖論地為六合之中心地周圍太陰水金太陽火木土劑恒星各有本輪俱為實體不相通而相切本輪之外又有均輪七政各行于均輪之界而均輪之心又行于本輪之界然此論不足以明七政運行之諸理今人無從之者第二的谷見十七圖論地為六合之中心地周圍太陰太陽及恒星各有本輪隨地旋轉水金火木土五曜之本輪則以太陽為心而本輪之上俱有均輪第三瑪爾象見十八圖論地為六合之中心不距本所而每日旋轉一周于南北兩極地周圍太陰太陽及恒星旋轉太陽周圍水金火木土之輪以上二家雖有可取然皆不如歌白尼之密
