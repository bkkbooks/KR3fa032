body:
  text: 第四歌白尼見第五圖置太陽于宇宙中心太陽最近者水星次金星次地次火星次木星次土星太陰之本輪繞地球土星旁有五小星繞之木星旁有四小星繞之各有本輪繞本星而行距斯諸輪最遠者乃為恆星天常靜不動按哥白尼序諸曜之次蓋本于尼色達之論而歌白尼特閳明之繼之者有刻白爾奈端噶西尼辣喀爾肋莫尼皆主其說今西士精求天文者竝以歌白尼所論序次推算諸曜之運動歌白尼論諸曜以太陽靜地球動為主人初聞此論輒驚為異說蓋之恃目證之故今以理明之如人自地視太陽太陰謂其兩徑相等而大不過五六寸若以法推則知太陽之徑百倍大于地球之徑而太陰之徑止為地球徑四分之一也人自地視太陽似太陽動而地球靜今設地球動太陽靜于推算既密合而于理亦屬無礙試舉二三端以驗其理其一日人在地面視諸曜之行皆環繞地球而地似常靜不動究不可以為地靜而諸曜動之據也譬如舟平浮海舟中之人見舟中諸物遠近彼此恆等則不覺舟行而視海岸山島及舟以外諸物時近時遠
