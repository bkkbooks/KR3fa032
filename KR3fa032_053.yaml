body:
  text: 周與地面相應者為地平圈此圈平置架上不動于其相對之處刻龄以納子午圈與地平相交成十字直角距地平九十度是為天頂渾天儀半在地平上半在地平下太陽出地平為書入地平為夜過子午圈為午中南北兩極為天之樞軸彼此相對赤道居其中距南北極各九十度中國地面所常見者謂之北極常不見者謂之南極北極出地高度隨所在測驗以為定太陽隨天西行三百六十五周之時又較恒星東行一周視為黃道平分黃道圈為四日春分秋分夏至冬至各居大圈四分之一每分又分為六分各十五度是為二十四氣黃道與赤道斜交其相交之處為春秋二分相距最遠之處為冬夏二至黃赤大距二十三度半黃赤南北二極亦距二十三度半赤極不動而黃極每日旋繞赤極一周是為南北兩極小圈黃赤兩至兩極共六圈欲其彼此聯屬故用兩過極圖以十字直角相交以當渾天儀之脊骨一圈過兩極并過春秋分為極分交圈一圈過兩極并過冬夏至為極至交圈相交之處于南北二極穿一銅條兩
  hash: sha256:adf1bc55b5daf0b6f867bdadc46c43efb988e09a4696145a53a02df327261a08
