body:
  text: 圈相應設如地球止甲巳兩點相應于天上之南北兩極亦名南北兩極地球上丁癸圈相應于天上之赤道亦名赤道餘圈放此地球赤道丁點之地平為南甲巳北人自地球之丁點視赤道于天頂視兩極于地平若人從丁點往北行四十度至京點其地平為子寅天頂為頂點天上之赤頂弧與地球之丁京弧相應各四十度而北極之出地平亦高四十度人從京點又往北至巳點則見北極于天頂而以丁癸赤道為地平此皆由地圓之故也凡在地之物以向地心為下以向于天者為上故人在地面上丁京巳癸甲等點東西南北各不同其足皆向地心則皆為向下交食第二圖太陰之體旣為圓球太陽之光恒照其半面向太陽之半恒明背太陽之半恒暗故人在地面上或全見其光面或半見或不見由此以生朔望弦之別設如朔日太陰之光面背地故自地不得見之朔以後太陰之光面漸向地故自地漸得見之望地在于太陰及太陽之間故自地全見太陰之光面望以後太陰之光面漸背地至朔日又不見其光面太
