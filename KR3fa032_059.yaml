body:
  text: 經筵講官南書房行走戶部左侍郎兼管國子監算學事務阮元撰嘉定錢少詹主講蘇州紫陽書院以地球圖説手稿若干葉授其門人元和李尚之鋭尚之以意聯屬為一卷書中所稱弟一弟二圖之等並佚不見然有説無圖讀者驟難通曉今依其説補作諸圖綴於其後以示初學云爾凡坤與全圖二太陽併遊曜諸圖一十九共二十一圓時嘉慶四年歲次已未日在南斗
