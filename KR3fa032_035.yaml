body:
  text: 論春夏秋冬歌白尼論春夏秋冬四季之輪流亦由地運動而生如十五圖子卯午酉撱圓象地球一年所循之本輪斯輪相應于渾天之黃道地兩極之軸斜行于黃道之軸而地赤道斜行于本輪各二十三度半是為黃赤距緯地循本輪其軸恆斜而其極恆向天之兩極今設地在本輪之午點則地球之與太陽應者在赤道北二十三度半故此處見太陽于天頂此時地旋轉于本心則見太陽于夏至圈繞地左行北方之畫長南方之畫短夏至後第八日地在本輪之乙點為
  hash: sha256:29dba3960820672f012c4cb2492dcc9960bdb682662fcd5fb7ba166a90ac7d95
