body:
  text: 地球圖説西洋人臣蔣友仁奉旨譒譯內閣學士兼禮部侍郎臣何國宗左春坊左贊善兼翰林院臣錢大昕同奉旨潤色坤與全圓説天體渾圓地居天中其體亦渾圓也地圓如球今畫大抵全圓作兩圈界以象上下兩半球合之卽成全球矣大地之經緯度各分三百六十與天度相應而以天上相應之處各之如圓之山下頂衝兩點與天之南北兩極應者亦名南北兩極橫線平分南北為兩半與天上赤道應者亦名赤道餘線傲此經緯線經線以赤道為主平分赤道為三百六十度每度各作一撱圓之弧上會于北極下會于南極以象地周三百六十經度此線卽為各處之子午線緯線以子午線為主平分子午線為三百六十度每度各作一圈惟赤道為大圈漸遠漸遠赤道則漸小北二極則合為一點以象地球南北各九十距等圈
  hash: sha256:f855854a1bee4fddbe584f3292a3fa93e28c7dbc1295f51a84e433cbbba83d1a
