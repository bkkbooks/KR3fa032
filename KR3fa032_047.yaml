body:
  text: 月望前後兩日因火星距地近故也土星旁有五小星各有本輪繞土星而行如水金二輪之圍繞太陽各小星行之遲速隨其輪之大小不等第一星行一日八十五刻第二星行兩日七十刻第三星行四日四十九刻第四星行十五日九十刻第五星行七十九日三十一刻俱循本輪一周木星旁有四小星各有本輪繞木星而行第一星行一日七十三刻第二星行三日五十二刻第三星行七日十四刻第四星行十六日六十六刻俱循本輪一周土木量刑既全為暗體必于太陽相對之處生影其周圍諸小星之體亦無光光借于日故入本星之影則食木星旁四小星以遠鏡望之易見又其食最繁每日或一或二可視其出入本星之影故用此以定各處之經度與月食同理又以遠鏡望土星之體有一光圈似渾天儀之地平此圈雖時變更未審其為何物按歌白尼所定諸曜次序五星皆如地球繞日順行于撱圓形之本輪其行一周之遲速不等由其距日遠近而生水星距日最近故其循本輪最速計八十
