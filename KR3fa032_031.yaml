body:
  text: 周天恆星恆星在天終古常靜不動自地視之似有兩種運動皆因地球旋轉之故每九十五刻十一分悶秒恆星似西行一周蓋此時地球于南北兩極之軸東行一周故也每七十二年恆星與黃道南北兩極似東行約一度蓋此時地球兩極之軸漸轉微偏約一度也七政體之大小及距地之遠近天文家皆能測知其實數惟恆星不然因其距地最遠雖細加測量僅知其大小遠近不等而巳又恆星本各有光其中多有較太陽更大者恆星距地最遠故地球並地球本輪之徑自恆星天視之僅如微點地球行本輪之時其南北二極恆向于天之南北二極在地雖相距有遠近以應恆星天之兩極常若無二諸曜徑各不同天文家測量七政遠近大小不等取規于地球半徑若測量土木旁九小星取規于本星之徑既知地徑之里數由此可推知他暚遠近大小之里數
