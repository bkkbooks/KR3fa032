body:
  text: 加于西半球容之亞西亞亞西亞天下一大州乃人類肇生之地聖賢迭出之鄉其界東至大東洋南至赤道南約弟十度西至紅海地中海黑海同河白海北至冰海所容國土不啻百餘其大者首推中國聲名文物禮樂政教遠近所宗鄂羅斯在喀爾喀楚庫河以北東南至格爾必齊河北岸白大典安嶺之陰以東與黑龍江所轄北境接略西接歐羅巴南至蒙古諸國北至冰海其國分十六道國中傳説天主經典及聖賢傳記然非天主正教西方多城習文藝禮樂東方山多人稀多獸皮如狐貉貂鼠之屬其最北夏至無夜中國之北迤西一帶直抵歐羅巴東界大小兩補喀里亞土爾幾斯堂等國總名為蒙古諸部令大半入籍進貢來朝其地沙磧由多水少人性勇悍其最百者駕屋于車以便遷徙其內奉囘囘教印的亞卽五印度總名中有數國惟莫窩爾為大分十四道金銀寶石甚多人面紫色不衣以尺布掩臍天竺卽南印度國古昔奉佛令亦然
