body:
  text: 白爾西亞亦大國昔盛今衰亞拉比亞其人精天文明醫學其南方産百物甚夥吟爾默尼哈納多里亦名度爾幾亞即古拂菻國也初宗馬何默之教諸國多同其後各立門戶互相排擊持戒亦有數端亞西亞之西有國日如德亞自一千七百六十年前天主降生于國之白德稜郡名日耶穌譯言救世主歐邏巴州歐邏巴州界東至亞西亞南至地中海西至大西洋北至冰海分十二大國不相統屬其餘諸小國亦各有本王諸國皆尚文學立學校凡官有三品一主教化一理政事一治兵戎上下皆奉天主教婚不二色教無異學土多肥饒産五榖出五金海舶四通商賈雲集工技精巧製器堅良國內多野獸北方産熊狼二種昂立亞國産大犬猛鷙能殺獅子代兵守城利未亞洲利未亞洲自古為奇怪之地産獅象諸異獸厄日多國四時不雨惟泥淥河每歲泛漲而地甚肥美一歲再收人有機智精天文測量善製水器以備旱潦婦人一乳禽鳥無算沿海諸國富商大賈多聚此其地
