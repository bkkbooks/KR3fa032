body:
  text: 斜立又況京師極高四十度瓊海極高二十度若自京師而觀瓊海其人立處皆當傾跌而今不然豈非首戴皆天足履皆地初無傾側不憂環立歟然則南行而過赤道之表北游而至戴極之下亦若是矣元又謂水地所以能居天中者天行至健有大氣以包舉之試以豆置豬膀胱中氣滿其內則豆虛騰而居其中以繩絡椀置水盈椀旋轉而急舞之椀側覆而水不溢置木球於水盎中攪水急漩則球必居正中登泰山極頂天寒風烈氣塞耳鳴況高遠千百倍於泰山者其健氣急旋地居其中人皆正立無分上下又何疑哉次所譯地球圖説侈言外國風土或不可據至其言天地七政恒星之行度則皆洽習古法所謂疇人子弟散在四夷者也少詹事原書有説無圖爰屬詹事高弟子李銳畫圖為說以補之凡坤與全圖二太陽併游曜諸圖一十九共二十亦圖是説也乃周公商高孔子會子之舊説也學者不必喜其新而宗之亦不必疑其奇而闢之可也
