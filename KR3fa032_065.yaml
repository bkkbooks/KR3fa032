body:
  text: 右坤與全圖據西域圖志地體圖補繪圖志以兩極為圈界直省及新疆回部地名一一詳載與友仁所稱正合今摘友仁所舉諸地名標之餘以幅狹不及詳録亞細亞作亞西亞伯西兒作伯西爾伯露作百露字異音近譯有不同也惟友仁所舉同河泥碌河銀河吉多國等地地體圖不載無由知其處所姑闕之以俟考
