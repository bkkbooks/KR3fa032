body:
  text: 端稍鋭便入子午圈以當儀樞七政之行皆以黃道為宗惟太陽正行黃道其餘六曜各有本道斜交于黃道或在黃道北或在黃道南最遠者不踰八度故渾天儀作黃道圈左右各寬八度以便指六曜之運行太陽隨天西行一周是為一日但每日各處畫夜長短不同因太陽在天所行之道不同如太陽行赤道極南則為冬至此時北方畫最短夜最長而太陽所行之道名為冬至圈冬至後太陽自南漸向北畫漸長夜漸短滿一象限至春分太陽與赤道合為一線而畫夜恰平春分以後太陽過赤道北滿一象限太陽行赤道極北是為夏至此時北方畫最長夜最短而太陽所行之道名為夏至圈夏至後太陽自北漸向南畫漸短夜漸長滿一象限至秋分太陽又與赤道合為一線而畫夜恰平秋分以後太陽過赤道南又行一象限而復于冬至此一歲太陽所行之道也太陽所行之道每日不同惟春秋二分行赤道大圈其餘皆為赤道距等圈然渾天儀內止設三圈即冬至夏至兩圈一為畫短規一為畫長規春秋分一圈即赤道圈亦名畫夜平規天下萬國非一人所能遍歷自古以來多有士抱雅
