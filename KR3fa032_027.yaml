body:
  text: 時左時右則反疑其運動矣今地球及地周圍之氣一無阻礙運動均勻人在地面上視周圍諸物之遠近恒等則不能覺地之運行而視地球外之諸曜見其時上時下時左時右則謂諸曜繞地球而旋行其二日雖説地動而太陽靜自地視之必似太陽動而地靜然以斯二者推太陽出入地平之度其數必相等如十九圖甲巳為地面上京點之地平卯午酉子為太陽西行繞地之圈設太陽在卯點則自京點見太陽出地平太陽自卯向午則漸升自午向酉則漸降太陽止酉點則自京點見太陽入地平太陽行地平之下自酉過子復至卯點又出地平此太陽動而地靜之説也今設卯點為太陽之本所常靜不動而地球右行自西往東旋轉于本心則天周圍卯午酉子圈之各店遽相輪流與地球京點相應故視太陽似升降出入于地平與前無異如圖京點相應于天之午點則視太陽于地平京點旋行向卯則太陽似升京點應天之卯點則太陽似至子午線京點自卯旋行半周應天之子點則太陽似入地平餘理倣此其三日太陽本為光體月水金火木土六曜皆為暗
  hash: sha256:8c4483fed64112159e209c6f74c4e75bfd646c73113bc02229f60a1db31642b2
