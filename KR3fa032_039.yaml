body:
  text: 酉點若從地心計之則視甲于丙視丁于午視乙于子此酉丙酉午酉子三弧為甲丁乙三星之地半徑差星距地愈近其差度愈多恒星距地最遠故無地半徑差地半徑差最大者在地平星漸高其差漸小星在天頂則無半徑差清蒙氣差蒙氣差能升卑為高人在地面自蒙氣內觀日月諸曜之高必大于實高設如十三圖癸壬為空盆于其底丁點置一錢人目在乙則光線射干庚故目不能視錢于丁若盆內添水則光纖旣入水必折而依曲線射于丁故自乙能視丁錢諸曜光線入蒙氣亦然如十四圖太陽在乾點若無蒙氣則自京點不能見太陽惟光線旣入蒙氣則折而至于京點故自京點能見太陽然視物者必依直線故自京點見太陽行于丙而乾丙弧為蒙氣差蒙氣差最大者在地平自地平以上漸小至天頂則無差矣京師地平蒙氣差測三十三分強論地圓第一圖中心為圓球以象地球其外大圈以象天之渾圓地球上黃赤兩至經緯等圈皆與天上同名諸
