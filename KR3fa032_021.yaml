body:
  text: 平曠而無城郭亦無書籍人面多黑色不衣服與猛獸同居土産金寶不知貴重惟好佩術士妖符率以重價購之亞墨利加州亞墨利加州相傳百年前西人航海始至其處地極廣大平分地球之半在赤道北初九度有山日巴納麻峽分州為二峽南日南亞墨利加峽北日北亞墨利加南亞墨利加國土産黃金取時金土相雜別之金多于土有大水名日銀河以中多銀沙得名獨不産鐵兵器用木石為之今諸國貿易相通漸知用鐵百露及所屬諸國四時無雨有異樹脂膏極香烈名巴爾撒摩以傅諸傷損益畫夜肌肉復合如故有大山南北長萬餘里其高無際山底極熱山坡高五六百丈有平地最廣名為吉多國天氣融合五殼百果草木悉皆上品又漸升此山則氣候漸寒山巔積雪四時不消此山往往噴火伯西爾國地甚肥美他方有病不能療者至此即瘳北亞墨利加惟默時科國最富饒城中街巷宮室皆精絶人多美秀國王寶藏極多羽毛為衣金銀飾之
