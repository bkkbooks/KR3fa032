body:
  text: 亦阿兒子者漢言地理志也其製以木為圓球畫水與地今之地球即其遺法西人之說以地體渾圓在天之中若令地球不在天中則在地之景必不能隨日周轉且遲速不等矣今春秋二分日輪六時在地平上為書六時在地平下為夜非在正中而何地體本圓故意日十二辰更迭互見如正向日之處得午時其正背日之處得子時處其東三十度得未時處其酉三十度得巳時相去二百五十里而差一度又七十五百里而差一時若以地為方體則惟對日之下者其時正處左處右者必長短不均矣西域此說即會子地圓之意亦即周髀日行之意非創解也梅徵君天學疑問日西人言永地合一圓球而四面居人其地度經緯正對者兩處之人以足版相抵而立其說可從歟日以渾天之理徴之則地之正圓無疑也是故南行二百五十里則南星多見一度而北極低一度北行二百五十里則北極高一度南星少見一度若地非正圓何以能然所疑者地既渾圓則人居地上不能平立也然吾以近事徵之江南北極高三十二度浙江高三十度相去二度則其所戴之天頂郎差二度各以所居之方為正則遙看異地皆成
  hash: sha256:099e03dadfb6f64f61f1b4bb315e880f2dd762cc58e44cf2447a07a2e7c43cf6
