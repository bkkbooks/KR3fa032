body:
  text: 京師計午正已過朝鮮國都之子午線其差為二刻十三分五十秒故朝鮮國都已有午正二刻十三分五十秒也又如拂郎濟亞國都城巴里斯之經度二十度距京師西一百十四度二分三十秒變時為三十二刻六分十秒故京師有午正則巴里斯止有寅正一刻八分五十秒巴里斯午正則京師有戌初二刻六分十秒緯度即南北兩極高度也凡地面與赤道應者視之道于天頂視兩極于地平距赤道向南一度則視南極高一度距赤道向北一度則視北極高一度如京師在赤道北四十度故視北極四十度高畫夜長短不等由兩極之高度所生地面與赤道應者四季畫夜皆等距赤道北愈遠則夏至畫愈長冬至畫愈短距赤道南愈遠則夏至畫愈短冬至畫愈長測量地周新程凡圓形有二一為平圓一為撱圓設經圈為平圓則分全圓為三百六十度其容積皆等自古天文家但論地為圓形未察此圓形何類今西士以新製儀器屢加推測則疑地球大圈未必是平圓行而其度所容之遠近亦未必相等以故拂郎濟亞國王特遣精
