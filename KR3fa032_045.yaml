body:
  text: 海及地面上所以之物太陽之光照太陰之面其點皆生黑影子太陽正對處測其所生之影則知太陰面上之山其高過于地面上之山也太陰面上黑點各有定所天文家各以命名之以為考驗東西經度之用設如太陰食而入地影或地影相切于太陰面上某黑點雖無先後然其虧復各分限時刻各處俱不等若知兩處時刻相差幾何即知兩處東西經度相距幾何如人在京師觀月食初虧及地影相切于某黑點在子初一刻三分又有人在伊犁觀月食初虧及地影相切于某黑點在亥初一刻二分兩處時差為兩小時一刻十三分以每時行度之率推之得三十四度即伊犁距京師西之經度五星水金火木土之體與地球相似其向日之半球恆明背日之半球恆暗金水二星自地視之有朔望上下兩弦順合如月之望退合如月之朔東西大距如月之上下弦但人以目視之不覺其變若以望遠鏡窺之可得金星朔望兩弦之象惟水星距太陽最近其體又微小故難以分耳土木火三星自地常視其光面獨火星距日九十度之時自地視其光面稍背似
